# @package _global_
# Two-object ourdata task using the same conservative MJWP baseline as examples/asm PickSpoonBowl.
dataset_dir: example_datasets
dataset_name: ourdata
robot_type: asm
embodiment_type: bimanual
task: robot
data_id: 0

viewer: none
show_viewer: false
rerun_spawn: false
save_video: true
save_info: true
save_metrics: true
save_config: true
wait_on_finish: false
contact_guidance: false

num_samples: 64
max_num_iterations: 4
temperature: 0.3
horizon: 1.0
ctrl_dt: 0.1
knot_dt: 0.1
nconmax_per_env: 1024
njmax_per_env: 2048
improvement_threshold: 0.0
use_torch_compile: false

init_pos_actuator_gain: 14.0
init_pos_actuator_bias: 14.0
init_rot_actuator_gain: 0.14
init_rot_actuator_bias: 0.14
guidance_decay_ratio: 0.8

# 1. 采样噪声：优化器会在当前控制序列附近采样候选动作。
joint_noise_scale: 0.03
pos_noise_scale: 0.005
rot_noise_scale: 0.005
# 2. qpos_rew 权重：手臂和手指回退到 joint_rew_scale=0.01，两个物体位置=1.0，两个物体旋转=0.3。
joint_rew_scale: 0.01
arm_joint_rew_scale: -1.0
hand_joint_rew_scale: -1.0
base_pos_rew_scale: 0.0
base_rot_rew_scale: 0.0
pos_rew_scale: 1.0
rot_rew_scale: 0.3
# 3. qvel_rew 权重：速度跟踪很弱，只作为间接平滑项。
vel_rew_scale: 0.0001
# 4. terminal_rew 权重：窗口最后一步复用总 reward 后再乘这个系数。
terminal_rew_scale: 1.0
# 5. contact/fingertip reward：ourdata 双物体默认没有接触点，且这个 conservative 配置关闭指尖显式位置 reward。
contact_rew_scale: 0.0
fingertip_rew_scale: 0.0
# 6. 终止阈值：物体位置或朝向误差超过阈值时，该候选 rollout 会提前终止。
object_pos_threshold: 0.15
object_rot_threshold: 0.5
